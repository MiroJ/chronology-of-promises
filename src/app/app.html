<main class="main">
    <div class="content">
        <div class="left-side">
            <div class="stepper">
                @for (item of items; track $index) {
                    <div class="step"
                        [class.step-completed]="item.completed"
                        [class.step-active]="!item.completed && $index === activeIndex"
                        [class.step-pending]="!item.completed && $index !== activeIndex"
                        [class.step-selected]="$index === selectedIndex()"
                        (click)="select($index)"
                        role="button"
                        [attr.aria-pressed]="$index === selectedIndex()"
                        tabindex="0"
                        (keydown.enter)="select($index)"
                        (keydown.space)="select($index)"
                    >
                        <div class="step-track">
                            <div class="step-circle">
                                <svg viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 5L4.5 8.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            @if (!$last) {
                                <div class="step-line"></div>
                            }
                        </div>
                        <span class="step-label">{{ item.label }}</span>
                    </div>
                }
            </div>
        </div>
        <div class="divider" role="separator" aria-label="Divider"></div>
        <div class="right-side">
            <div class="content-area">
                <h2>{{ items[selectedIndex()].label }}</h2>
                <p>{{ items[selectedIndex()].details }}</p>
            </div>
        </div>
    </div>
</main>

<router-outlet />
